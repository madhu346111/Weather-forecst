<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Weather App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-blue-400 via-purple-500 to-pink-400 min-h-screen flex flex-col items-center justify-start p-5 transition-all">

  <div class="flash" id="flash"></div>
  <div id="weatherAnimation"></div>

  <!-- Dark/Light Toggle -->
  <button id="modeToggle"
    class="fixed top-4 right-4 w-12 h-12 sm:w-14 sm:h-14 md:w-16 md:h-16 rounded-full bg-yellow-400 text-black flex items-center justify-center font-bold hover:bg-yellow-500 text-lg sm:text-xl md:text-2xl shadow-lg transition-all">
    🌙
  </button>

  <!-- Main Weather Card -->
  <div class="mt-24 bg-white/20 backdrop-blur-lg shadow-2xl rounded-3xl p-6 md:p-8 w-full max-w-5xl text-white flex flex-col gap-6">
    <h1 class="text-3xl md:text-4xl font-bold text-center">🌤 Smart Weather App</h1>

    <!-- Search -->
    <div class="flex flex-col sm:flex-row gap-3">
      <input id="cityInput" type="text" placeholder="Enter City..." 
        class="flex-1 p-3 rounded-xl text-black focus:outline-none text-lg">
      <button id="searchBtn"
        class="bg-yellow-400 hover:bg-yellow-500 text-black px-6 py-2 rounded-xl font-semibold text-lg transition">Search</button>
    </div>

    <!-- Current Weather -->
    <div id="currentWeather" class="text-center hidden flex flex-col items-center gap-3">
      <img id="weatherIcon" class="w-24 md:w-28 mx-auto">
      <h2 id="cityName" class="text-2xl md:text-3xl font-semibold"></h2>
      <p id="temperature" class="text-4xl md:text-5xl font-bold"></p>
      <p id="description" class="text-lg md:text-xl"></p>
    </div>

    <!-- Forecast -->
    <div id="forecast" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4"></div>

    <!-- Hourly Chart -->
    <canvas id="hourlyChart" class="bg-white/20 p-4 rounded-2xl"></canvas>
  </div>

<script src="script.js"></script>
</body>
</html>
